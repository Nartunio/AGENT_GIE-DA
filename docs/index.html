<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AGENT_GIE-DA</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-strong: #eef2f6;
        --text: #111827;
        --muted: #5b6472;
        --line: #d9e0e8;
        --blue: #2563eb;
        --green: #15803d;
        --red: #b91c1c;
        --amber: #b45309;
        --ink: #202938;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
      }

      .sidebar {
        background: var(--ink);
        color: #f8fafc;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .mark {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: var(--ink);
        font-weight: 800;
      }

      .brand h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.1;
      }

      .brand p {
        margin: 4px 0 0;
        color: #b8c2d1;
        font-size: 13px;
      }

      .panel {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      label {
        color: #dbe4ef;
        font-size: 13px;
        font-weight: 650;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: #f8fafc;
        padding: 0 12px;
        outline: none;
      }

      textarea {
        min-height: 76px;
        padding: 10px 12px;
        resize: vertical;
      }

      select option {
        color: var(--text);
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: #8ab4ff;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.24);
      }

      .primary {
        width: 100%;
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        background: var(--blue);
        color: #fff;
        font-weight: 750;
        cursor: pointer;
      }

      .primary:hover {
        background: #1d4ed8;
      }

      .secondary {
        width: 100%;
        min-height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        min-height: 34px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        background: transparent;
        color: #e5edf7;
        padding: 0 12px;
        cursor: pointer;
      }

      .content {
        padding: 34px;
        display: grid;
        gap: 22px;
        align-content: start;
      }

      .topline {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-start;
      }

      .company h2 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      .company p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .rating {
        min-width: 150px;
        padding: 14px;
        border-radius: 8px;
        background: var(--surface);
        border: 1px solid var(--line);
        text-align: right;
      }

      .rating strong {
        display: block;
        font-size: 24px;
      }

      .rating span {
        color: var(--muted);
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 14px;
      }

      .metric,
      .section,
      .agent {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .metric {
        padding: 15px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        margin-top: 8px;
        font-size: 22px;
      }

      .section {
        padding: 18px;
      }

      .section h3 {
        margin: 0 0 12px;
        font-size: 17px;
      }

      .section p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .chart {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        display: grid;
        gap: 12px;
      }

      .chart-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      .chart h3 {
        margin: 0;
        font-size: 17px;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .legend i {
        width: 18px;
        height: 3px;
        border-radius: 999px;
        display: inline-block;
      }

      .chart svg {
        width: 100%;
        height: auto;
        min-height: 320px;
        display: block;
        overflow: visible;
      }

      .signals {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }

      .signal {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #fbfcfe;
      }

      .signal strong {
        display: block;
        margin-bottom: 4px;
      }

      .signal p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 13px;
      }

      .debate-controls {
        display: grid;
        gap: 10px;
      }

      .split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .debate {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        display: grid;
        gap: 14px;
      }

      .debate-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .debate-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: #fbfcfe;
      }

      .debate-card h4 {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .debate-card p,
      .debate-status {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .agents {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .agent {
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .agent-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .agent h3 {
        margin: 0;
        font-size: 16px;
      }

      .score {
        font-weight: 800;
      }

      .bar {
        height: 9px;
        border-radius: 999px;
        background: var(--surface-strong);
        overflow: hidden;
      }

      .bar > span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--blue);
      }

      .agent p,
      li {
        color: var(--muted);
        line-height: 1.45;
      }

      ul {
        margin: 0;
        padding-left: 18px;
      }

      .positive {
        color: var(--green);
      }

      .negative {
        color: var(--red);
      }

      .neutral {
        color: var(--amber);
      }

      .empty {
        min-height: 420px;
        display: grid;
        place-items: center;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        text-align: center;
        padding: 28px;
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }

        .grid,
        .split,
        .agents,
        .debate-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .sidebar,
        .content {
          padding: 20px;
        }

        .topline {
          display: grid;
        }

        .rating {
          text-align: left;
        }

        .grid,
        .split,
        .agents,
        .debate-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="mark">AG</div>
          <div>
            <h1>AGENT_GIE-DA</h1>
        <p>Multiagentowa analiza spolek z sygnalem social</p>
          </div>
        </div>

        <form class="panel" id="analysis-form">
          <div class="field">
            <label for="company">Spolka albo ticker</label>
            <input id="company" name="company" value="CD Projekt" autocomplete="off" />
          </div>

          <div class="field">
            <label for="horizon">Horyzont</label>
            <select id="horizon" name="horizon">
              <option value="short">Krotki</option>
              <option value="medium" selected>Sredni</option>
              <option value="long">Dlugi</option>
            </select>
          </div>

          <div class="field">
            <label for="risk">Profil ryzyka</label>
            <select id="risk" name="risk">
              <option value="conservative">Konserwatywny</option>
              <option value="balanced" selected>Zrownowazony</option>
              <option value="aggressive">Agresywny</option>
            </select>
          </div>

          <button class="primary" type="submit">Generuj raport</button>
        </form>

        <div class="panel debate-controls">
          <div class="field">
            <label for="depth">Glebokosc debaty Ollama</label>
            <select id="depth" name="depth">
              <option value="quick">Szybka</option>
              <option value="standard">Standard</option>
              <option value="deep" selected>Gleboka</option>
            </select>
          </div>
          <div class="field">
            <label for="rounds">Rundy wymiany argumentow</label>
            <select id="rounds" name="rounds">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
            </select>
          </div>
          <div class="split">
            <div class="field">
              <label for="investor-style">Styl inwestora</label>
              <select id="investor-style">
                <option value="quality" selected>Quality</option>
                <option value="value">Value</option>
                <option value="growth">Growth</option>
                <option value="dividend">Dividend</option>
                <option value="speculative">Speculative</option>
              </select>
            </div>
            <div class="field">
              <label for="margin-safety">Margines bezp.</label>
              <select id="margin-safety">
                <option value="0.05">5%</option>
                <option value="0.10">10%</option>
                <option value="0.15" selected>15%</option>
                <option value="0.25">25%</option>
                <option value="0.40">40%</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="bull-model">Model BullAgent</label>
            <input id="bull-model" value="llama3.1:8b" autocomplete="off" />
          </div>
          <div class="field">
            <label for="bear-model">Model BearAgent</label>
            <input id="bear-model" value="llama3.1:8b" autocomplete="off" />
          </div>
          <div class="field">
            <label for="judge-model">Model JudgeAgent</label>
            <input id="judge-model" value="llama3.1:8b" autocomplete="off" />
          </div>
          <div class="field">
            <label for="user-thesis">Teza do sprawdzenia</label>
            <textarea id="user-thesis" placeholder="Np. Kupic tylko jesli wybije opor i utrzyma marze."></textarea>
          </div>
          <button class="secondary" id="debate-button" type="button">Debata Ollama</button>
        </div>

        <div class="chips" aria-label="Popularne spolki">
          <button class="chip" type="button" data-symbol="PKO BP">PKO BP</button>
          <button class="chip" type="button" data-symbol="Orlen">Orlen</button>
          <button class="chip" type="button" data-symbol="CD Projekt">CD Projekt</button>
          <button class="chip" type="button" data-symbol="Apple">Apple</button>
          <button class="chip" type="button" data-symbol="Microsoft">Microsoft</button>
        </div>
      </aside>

      <section class="content" id="report" aria-live="polite">
        <div class="empty">
          <div>
            <strong>Wybierz spolke</strong>
            <p>Raport pojawi sie tutaj po uruchomieniu analizy.</p>
          </div>
        </div>
      </section>
    </main>

    <script>
      const companies = {
        "PKO BP": {
          symbol: "PKO.WA",
          name: "PKO Bank Polski",
          sector: "Banki",
          price: 63.4,
          currency: "PLN",
          pe: 8.9,
          growth: 0.07,
          debt: 0.72,
          rsi: 58,
          trend: 0.09,
        sentiment: 0.2,
        socialMentions: 34,
        },
        ORLEN: {
          symbol: "PKN.WA",
          name: "Orlen",
          sector: "Energia",
          price: 72.1,
          currency: "PLN",
          pe: 11.8,
          growth: 0.03,
          debt: 1.35,
          rsi: 46,
          trend: -0.02,
        sentiment: -0.05,
        socialMentions: 21,
        },
        "CD PROJEKT": {
          symbol: "CDR.WA",
          name: "CD Projekt",
          sector: "Gry",
          price: 205.2,
          currency: "PLN",
          pe: 31.6,
          growth: 0.18,
          debt: 0.12,
          rsi: 64,
          trend: 0.12,
          sentiment: 0.28,
          socialMentions: 48,
        },
        APPLE: {
          symbol: "AAPL",
          name: "Apple Inc.",
          sector: "Technologia",
          price: 190,
          currency: "USD",
          pe: 29,
          growth: 0.06,
          debt: 1.6,
          rsi: 54,
          trend: 0.04,
          sentiment: 0.18,
          socialMentions: 57,
        },
        MICROSOFT: {
          symbol: "MSFT",
          name: "Microsoft Corporation",
          sector: "Technologia",
          price: 420,
          currency: "USD",
          pe: 34,
          growth: 0.14,
          debt: 0.4,
          rsi: 61,
          trend: 0.08,
          sentiment: 0.24,
          socialMentions: 62,
        },
      };

      const aliases = {
        PKO: "PKO BP",
        "PKO.WA": "PKO BP",
        PKN: "ORLEN",
        "PKN.WA": "ORLEN",
        ORLEN: "ORLEN",
        CDR: "CD PROJEKT",
        "CDR.WA": "CD PROJEKT",
        "CD PROJEKT": "CD PROJEKT",
        AAPL: "APPLE",
        APPLE: "APPLE",
        MSFT: "MICROSOFT",
        MICROSOFT: "MICROSOFT",
      };

      const labels = {
        short: "krotki",
        medium: "sredni",
        long: "dlugi",
        conservative: "konserwatywny",
        balanced: "zrownowazony",
        aggressive: "agresywny",
      };

      const form = document.querySelector("#analysis-form");
      const companyInput = document.querySelector("#company");
      const report = document.querySelector("#report");
      const debateButton = document.querySelector("#debate-button");
      const depthInput = document.querySelector("#depth");
      const roundsInput = document.querySelector("#rounds");
      const investorStyleInput = document.querySelector("#investor-style");
      const marginSafetyInput = document.querySelector("#margin-safety");
      const bullModelInput = document.querySelector("#bull-model");
      const bearModelInput = document.querySelector("#bear-model");
      const judgeModelInput = document.querySelector("#judge-model");
      const userThesisInput = document.querySelector("#user-thesis");
      let currentState = null;
      let lastDebateMarkdown = "";

      document.querySelectorAll("[data-symbol]").forEach((button) => {
        button.addEventListener("click", () => {
          companyInput.value = button.dataset.symbol;
          form.requestSubmit();
        });
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const formData = new FormData(form);
        const query = String(formData.get("company") || "").trim();
        const horizon = String(formData.get("horizon"));
        const risk = String(formData.get("risk"));
        const company = resolveCompany(query);
        const analysis = analyze(company, horizon, risk);
        currentState = { company, analysis, horizon, risk };
        renderReport(company, analysis, horizon, risk);
      });

      debateButton.addEventListener("click", async () => {
        const formData = new FormData(form);
        const query = String(formData.get("company") || "").trim();
        const horizon = String(formData.get("horizon"));
        const risk = String(formData.get("risk"));
        const company = resolveCompany(query);
        const analysis = currentState?.analysis || analyze(company, horizon, risk);
        currentState = { company, analysis, horizon, risk };
        renderReport(company, analysis, horizon, risk);
        await runOllamaDebate(company, horizon, risk);
      });

      function resolveCompany(query) {
        const key = query.toUpperCase();
        const canonical = aliases[key] || key;
        if (companies[canonical]) {
          return companies[canonical];
        }

        const seed = [...key].reduce((sum, char) => sum + char.charCodeAt(0), 0) || 100;
        return {
          symbol: key.slice(0, 12),
          name: query || "Nieznana spolka",
          sector: "Do weryfikacji",
          price: round(40 + (seed % 180), 2),
          currency: "PLN",
          pe: round(8 + (seed % 36), 1),
          growth: round(((seed % 31) - 8) / 100, 2),
          debt: round((seed % 24) / 10, 2),
          rsi: 25 + (seed % 55),
          trend: round(((seed % 29) - 12) / 100, 2),
          sentiment: round(((seed % 41) - 20) / 100, 2),
          socialMentions: 8 + (seed % 35),
        };
      }

      function analyze(company, horizon, risk) {
        const history = generateHistory(company);
        const chart = analyzeChart(history);
        const fundamental = scoreFundamentals(company);
        const technical = scoreTechnicals(company, chart);
        const sentiment = scoreSentiment(company);
        const riskScore = scoreRisk(company, risk);
        const scores = [fundamental, technical, sentiment, riskScore];
        const average = scores.reduce((sum, item) => sum + item.score, 0) / scores.length;
        const rating = ratingFromScore(average);

        return {
          rating,
          confidence: Math.min(95, Math.round(48 + Math.abs(average) * 47)),
          average,
          agents: scores,
          chart,
          thesis: buildThesis(company, rating, horizon, risk, average),
          risks: buildRisks(company, risk),
          actions: buildActions(company, rating),
        };
      }

      function scoreFundamentals(company) {
        let score = 0;
        const evidence = [];
        if (company.growth > 0.1) {
          score += 0.35;
          evidence.push("Wzrost przychodow przekracza 10%.");
        } else if (company.growth < 0) {
          score -= 0.35;
          evidence.push("Dynamika przychodow jest ujemna.");
        }
        if (company.pe < 16) {
          score += 0.25;
          evidence.push("Wycena na wskazniku P/E jest umiarkowana.");
        } else if (company.pe > 32) {
          score -= 0.22;
          evidence.push("Wycena wymaga wysokich oczekiwan rynku.");
        }
        if (company.debt < 1) {
          score += 0.18;
          evidence.push("Zadluzenie pozostaje pod kontrola.");
        } else if (company.debt > 2) {
          score -= 0.24;
          evidence.push("Dzwignia finansowa jest podwyzszona.");
        }
        return agent("Fundamentalny", score, evidence);
      }

      function scoreTechnicals(company, chart) {
        let score = 0;
        const evidence = [];
        if (company.trend > 0.05) {
          score += 0.34;
          evidence.push("Trend 30-dniowy jest dodatni.");
        } else if (company.trend < -0.05) {
          score -= 0.34;
          evidence.push("Trend 30-dniowy jest ujemny.");
        }
        if (company.rsi < 30) {
          score += 0.14;
          evidence.push("RSI sugeruje wyprzedanie.");
        } else if (company.rsi > 70) {
          score -= 0.14;
          evidence.push("RSI sugeruje wykupienie.");
        } else {
          evidence.push("RSI nie pokazuje skrajnego odchylenia.");
        }
        if (chart.direction === "up") {
          score += 0.16;
          evidence.push("Linia trendu na wykresie jest wzrostowa.");
        } else if (chart.direction === "down") {
          score -= 0.16;
          evidence.push("Linia trendu na wykresie jest spadkowa.");
        } else {
          evidence.push("Cena porusza sie w konsolidacji.");
        }
        chart.signals.slice(0, 3).forEach((signal) => evidence.push(signal.title + ": " + signal.text));
        return agent("Techniczny", score, evidence);
      }

      function scoreSentiment(company) {
        const evidence =
          company.sentiment > 0.12
            ? ["Narracja rynkowa jest pozytywna."]
            : company.sentiment < -0.12
              ? ["Narracja rynkowa jest negatywna."]
              : ["Narracja rynkowa jest mieszana."];
        evidence.push(`Wzmianki social/X w probce demo: ${company.socialMentions}.`);
        return agent("Social / X", company.sentiment, evidence);
      }

      function scoreRisk(company, risk) {
        let score = 0;
        const evidence = [];
        if (company.debt > 1.8) {
          score -= 0.32;
          evidence.push("Wysokie zadluzenie zwieksza wrazliwosc na stopy procentowe.");
        }
        if (company.pe > 35) {
          score -= 0.24;
          evidence.push("Wysoka wycena obniza margines bezpieczenstwa.");
        }
        if (risk === "conservative") {
          score -= 0.12;
          evidence.push("Profil konserwatywny wymaga wyzszej jakosci sygnalow.");
        }
        if (risk === "aggressive") {
          score += 0.08;
          evidence.push("Profil agresywny dopuszcza wieksza zmiennosc.");
        }
        return agent("Ryzyko", score, evidence.length ? evidence : ["Brak silnego sygnalu ryzyka."]);
      }

      function agent(name, score, evidence) {
        const bounded = Math.max(-1, Math.min(1, score));
        return { name, score: bounded, evidence };
      }

      function ratingFromScore(score) {
        if (score >= 0.42) return "Mocne kupuj";
        if (score >= 0.18) return "Kupuj";
        if (score > -0.1) return "Neutralnie";
        if (score > -0.34) return "Obserwuj";
        return "Unikaj";
      }

      function buildThesis(company, rating, horizon, risk, score) {
        const direction =
          score > 0.18
            ? "przewaga sygnalow pozytywnych"
            : score < -0.1
              ? "przewaga czynnikow ostroznosciowych"
              : "mieszany zestaw sygnalow";
        return `${company.name} (${company.symbol}) otrzymuje ocene "${rating}" na ${labels[horizon]} horyzont przy profilu ${labels[risk]}. Model widzi ${direction}, laczac fundamenty, technike, sentyment i ryzyko.`;
      }

      function buildRisks(company, risk) {
        const risks = [];
        if (company.pe > 30) risks.push("Wycena moze byc wrazliwa na korekte oczekiwan.");
        if (company.debt > 1.5) risks.push("Zadluzenie podnosi ryzyko przy wyzszych kosztach finansowania.");
        if (company.trend < 0) risks.push("Krotkoterminowy trend nie wspiera wejscia bez potwierdzenia.");
        if (risk === "conservative") risks.push("Dla profilu konserwatywnego potrzebny jest wiekszy margines bezpieczenstwa.");
        return risks.length ? risks : ["Najwiekszym ryzykiem jest jakosc danych zrodlowych i brak pelnego modelu wyceny."];
      }

      function buildActions(company, rating) {
        if (rating.includes("Kupuj")) {
          return [
            "Porownaj wycene z najblizszymi konkurentami.",
            "Sprawdz najnowszy raport kwartalny i guidance zarzadu.",
            "Ustal poziom invalidacji tezy przed transakcja.",
          ];
        }
        if (rating === "Unikaj") {
          return [
            "Poczekaj na poprawe dynamiki wynikow albo wyceny.",
            "Zweryfikuj, czy negatywne sygnaly sa jednorazowe.",
            "Porownaj alternatywy w sektorze " + company.sector + ".",
          ];
        }
        return [
          "Dodaj spolke do watchlisty.",
          "Poczekaj na mocniejszy sygnal fundamentalny albo techniczny.",
          "Zweryfikuj dane w zewnetrznym zrodle przed decyzja.",
        ];
      }

      function renderReport(company, analysis, horizon, risk) {
        const scoreClass =
          analysis.average > 0.18 ? "positive" : analysis.average < -0.1 ? "negative" : "neutral";
        report.innerHTML = `
          <div class="topline">
            <div class="company">
              <h2>${escapeHtml(company.name)}</h2>
              <p>${escapeHtml(company.symbol)} · ${escapeHtml(company.sector)} · ${labels[horizon]} horyzont · ${labels[risk]} profil</p>
            </div>
            <div class="rating">
              <strong class="${scoreClass}">${escapeHtml(analysis.rating)}</strong>
              <span>Pewnosc ${analysis.confidence}%</span>
            </div>
          </div>

          <div class="grid">
            ${metric("Cena", `${company.price.toFixed(2)} ${company.currency}`)}
            ${metric("P/E", company.pe.toFixed(1))}
            ${metric("Wzrost", percent(company.growth))}
            ${metric("Trend 30D", percent(company.trend))}
            ${metric("Wzmianki social", String(company.socialMentions))}
          </div>

          <section class="chart">
            <div class="chart-head">
              <h3>Wykres techniczny</h3>
              <div class="legend">
                <span><i style="background:#111827"></i>Cena</span>
                <span><i style="background:#2563eb"></i>SMA20</span>
                <span><i style="background:#b45309"></i>SMA50</span>
                <span><i style="background:#15803d"></i>Trend</span>
                <span><i style="background:#b91c1c"></i>Wsparcie / opor</span>
              </div>
            </div>
            ${renderChart(analysis.chart, company)}
            <div class="signals">
              ${analysis.chart.signals.map(renderSignal).join("")}
            </div>
          </section>

          <section class="debate" id="ollama-debate">
            <h3>Debata Ollama</h3>
            <p class="debate-status">Uruchom lokalna debate: agent za zakupem, agent przeciw i arbiter porownujacy argumenty.</p>
          </section>

          <section class="section">
            <h3>Teza</h3>
            <p>${escapeHtml(analysis.thesis)}</p>
          </section>

          <div class="agents">
            ${analysis.agents.map(renderAgent).join("")}
          </div>

          <section class="section">
            <h3>Ryzyka</h3>
            <ul>${analysis.risks.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </section>

          <section class="section">
            <h3>Nastepne kroki</h3>
            <ul>${analysis.actions.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </section>
        `;
      }

      async function runOllamaDebate(company, horizon, risk) {
        const container = document.querySelector("#ollama-debate");
        container.innerHTML = `
          <h3>Debata Ollama</h3>
          <p class="debate-status">Pracuje lokalnie: BullAgent buduje case za zakupem, BearAgent kontruje, JudgeAgent porownuje argumenty. To moze potrwac.</p>
        `;
        const bullModel = bullModelInput.value.trim() || "llama3.1:8b";
        const bearModel = bearModelInput.value.trim() || bullModel;
        const judgeModel = judgeModelInput.value.trim() || bullModel;
        try {
          const response = await fetch("http://127.0.0.1:8000/api/v1/debate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              symbol: company.symbol.replace(".WA", ""),
              horizon,
              risk_profile: risk,
              depth: depthInput.value,
              rounds: Number(roundsInput.value),
              investor_style: investorStyleInput.value,
              margin_of_safety_required: Number(marginSafetyInput.value),
              user_thesis: userThesisInput.value.trim() || null,
              bull_model: bullModel,
              bear_model: bearModel,
              judge_model: judgeModel,
            }),
          });
          if (!response.ok) {
            throw new Error(await response.text());
          }
          renderDebate(await response.json());
        } catch (error) {
          container.innerHTML = `
            <h3>Debata Ollama</h3>
            <p class="debate-status">Nie udalo sie polaczyc z lokalnym API/Ollama. Uruchom launcher z pulpitu, sprawdz czy Ollama dziala na 127.0.0.1:11434 i czy model jest pobrany.</p>
            <pre style="white-space:pre-wrap;color:#b91c1c;margin:0">${escapeHtml(String(error.message || error))}</pre>
          `;
        }
      }

      function renderDebate(data) {
        const container = document.querySelector("#ollama-debate");
        lastDebateMarkdown = debateToMarkdown(data);
        container.innerHTML = `
          <h3>Debata Ollama</h3>
          <p class="debate-status"><strong>Decyzja:</strong> ${escapeHtml(data.final_decision)} · pewnosc ${(data.confidence * 100).toFixed(0)}% · rundy ${data.rounds} · tryb ${data.depth}</p>
          <div class="toolbar">
            <button class="primary" type="button" onclick="downloadDebateMarkdown()">Eksport Markdown</button>
          </div>
          <div class="debate-grid">
            ${renderDebateCard("BullAgent", data.bull_case)}
            ${renderDebateCard("BearAgent", data.bear_case)}
            ${renderDebateCard("JudgeAgent", data.judge)}
          </div>
          <section class="section" style="padding:14px">
            <h3>Porownanie argumentow</h3>
            <ul>${(data.comparison || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </section>
          <section class="section" style="padding:14px">
            <h3>Brakujace informacje</h3>
            <ul>${(data.missing_information || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </section>
        `;
      }

      function renderDebateCard(title, output) {
        const argumentsList = (output.arguments || []).slice(0, 6);
        return `
          <article class="debate-card">
            <h4>${escapeHtml(title)} · ${escapeHtml(output.model)}</h4>
            <p><strong>Teza:</strong> ${escapeHtml(output.thesis)}</p>
            <ul>${argumentsList.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </article>
        `;
      }

      function debateToMarkdown(data) {
        const section = (title, items) => `\\n## ${title}\\n${(items || []).map((item) => `- ${item}`).join("\\n") || "- Brak"}`;
        return `# Debata Ollama: ${data.company_name} (${data.symbol})

Decyzja: ${data.final_decision}
Pewnosc: ${(data.confidence * 100).toFixed(0)}%
Tryb: ${data.depth}
Rundy: ${data.rounds}

## BullAgent
${data.bull_case.thesis}
${section("Argumenty BullAgent", data.bull_case.arguments)}
${section("Kontry BullAgent", data.bull_case.rebuttals)}

## BearAgent
${data.bear_case.thesis}
${section("Argumenty BearAgent", data.bear_case.arguments)}
${section("Kontry BearAgent", data.bear_case.rebuttals)}

## JudgeAgent
${data.judge.thesis}
${section("Porownanie", data.comparison)}
${section("Brakujace informacje", data.missing_information)}
`;
      }

      function downloadDebateMarkdown() {
        if (!lastDebateMarkdown) return;
        const blob = new Blob([lastDebateMarkdown], { type: "text/markdown" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "debata-ollama.md";
        link.click();
        URL.revokeObjectURL(url);
      }

      function renderAgent(agentResult) {
        const width = Math.round(((agentResult.score + 1) / 2) * 100);
        const scoreClass = agentResult.score > 0.15 ? "positive" : agentResult.score < -0.15 ? "negative" : "neutral";
        return `
          <article class="agent">
            <div class="agent-head">
              <h3>${escapeHtml(agentResult.name)}</h3>
              <span class="score ${scoreClass}">${agentResult.score.toFixed(2)}</span>
            </div>
            <div class="bar"><span style="width:${width}%"></span></div>
            <ul>${agentResult.evidence.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </article>
        `;
      }

      function renderSignal(signal) {
        return `
          <div class="signal">
            <strong>${escapeHtml(signal.title)}</strong>
            <p>${escapeHtml(signal.text)}</p>
          </div>
        `;
      }

      function generateHistory(company) {
        const seed = [...company.symbol].reduce((sum, char) => sum + char.charCodeAt(0), 0);
        const points = [];
        const length = 90;
        const drift = company.trend / length;
        let close = company.price / (1 + company.trend || 1);

        for (let index = 0; index < length; index += 1) {
          const wave = Math.sin((index + seed) / 5) * 0.018 + Math.cos((index + seed) / 13) * 0.01;
          const impulse = index > 62 && company.trend > 0.06 ? 0.0025 : 0;
          close = Math.max(1, close * (1 + drift + wave + impulse));
          const open = close * (1 - wave / 2);
          const high = Math.max(open, close) * (1.008 + Math.abs(wave) / 3);
          const low = Math.min(open, close) * (0.992 - Math.abs(wave) / 4);
          points.push({
            index,
            open: round(open, 2),
            high: round(high, 2),
            low: round(low, 2),
            close: round(close, 2),
          });
        }

        const scale = company.price / points[points.length - 1].close;
        return points.map((point) => ({
          ...point,
          open: round(point.open * scale, 2),
          high: round(point.high * scale, 2),
          low: round(point.low * scale, 2),
          close: round(point.close * scale, 2),
        }));
      }

      function analyzeChart(history) {
        const closes = history.map((point) => point.close);
        const lows = history.map((point) => point.low);
        const highs = history.map((point) => point.high);
        const support = Math.min(...lows.slice(-28));
        const resistance = Math.max(...highs.slice(-28));
        const sma20 = movingAverage(closes, 20);
        const sma50 = movingAverage(closes, 50);
        const start = closes[closes.length - 31];
        const end = closes[closes.length - 1];
        const trendChange = (end - start) / start;
        const direction = trendChange > 0.05 ? "up" : trendChange < -0.05 ? "down" : "sideways";
        const signals = [];

        if ((resistance - end) / Math.max(resistance - support, 0.01) < 0.18) {
          signals.push({
            title: "Test oporu",
            text: "Cena jest blisko gornego ograniczenia zakresu. Przebicie moze potwierdzic kontynuacje trendu.",
          });
        }
        if ((end - support) / Math.max(resistance - support, 0.01) < 0.18) {
          signals.push({
            title: "Test wsparcia",
            text: "Cena jest blisko wsparcia. Utrzymanie poziomu moze dac sygnal odbicia, a wybicie ostrzega przed spadkiem.",
          });
        }
        if (sma20.at(-1) && sma50.at(-1) && sma20.at(-1) > sma50.at(-1) && end > sma20.at(-1)) {
          signals.push({
            title: "Uklad srednich wzrostowy",
            text: "SMA20 jest powyzej SMA50, a cena utrzymuje sie nad srednimi.",
          });
        }
        if (sma20.at(-1) && sma50.at(-1) && sma20.at(-1) < sma50.at(-1) && end < sma20.at(-1)) {
          signals.push({
            title: "Presja srednich",
            text: "SMA20 jest pod SMA50, a cena pozostaje pod krotka srednia.",
          });
        }
        if (signals.length === 0) {
          signals.push({
            title: "Brak czystej formacji",
            text: "Wykres nie pokazuje jednoznacznego ukladu. Warto czekac na wybicie zakresu albo test srednich.",
          });
        }

        return { history, support, resistance, sma20, sma50, direction, signals };
      }

      function movingAverage(values, period) {
        return values.map((_, index) => {
          if (index + 1 < period) return null;
          const window = values.slice(index + 1 - period, index + 1);
          return window.reduce((sum, value) => sum + value, 0) / period;
        });
      }

      function renderChart(chart, company) {
        const width = 920;
        const height = 340;
        const pad = { top: 22, right: 64, bottom: 32, left: 48 };
        const values = [
          ...chart.history.flatMap((point) => [point.high, point.low]),
          ...chart.sma20.filter(Boolean),
          ...chart.sma50.filter(Boolean),
          chart.support,
          chart.resistance,
        ];
        const min = Math.min(...values) * 0.985;
        const max = Math.max(...values) * 1.015;
        const x = (index) => pad.left + (index / (chart.history.length - 1)) * (width - pad.left - pad.right);
        const y = (value) => pad.top + ((max - value) / (max - min)) * (height - pad.top - pad.bottom);
        const closePath = chart.history.map((point) => `${x(point.index)},${y(point.close)}`).join(" ");
        const sma20Path = chart.sma20
          .map((value, index) => (value ? `${x(index)},${y(value)}` : null))
          .filter(Boolean)
          .join(" ");
        const sma50Path = chart.sma50
          .map((value, index) => (value ? `${x(index)},${y(value)}` : null))
          .filter(Boolean)
          .join(" ");
        const trendStart = chart.history.length - 31;
        const trendEnd = chart.history.length - 1;
        const grid = Array.from({ length: 5 }, (_, index) => {
          const value = min + ((max - min) / 4) * index;
          const yy = y(value);
          return `<line x1="${pad.left}" x2="${width - pad.right}" y1="${yy}" y2="${yy}" stroke="#e6ebf1"/><text x="${width - pad.right + 8}" y="${yy + 4}" fill="#5b6472" font-size="12">${value.toFixed(2)}</text>`;
        }).join("");

        return `
          <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Wykres techniczny ${escapeHtml(company.name)}">
            <rect x="0" y="0" width="${width}" height="${height}" fill="#ffffff"/>
            ${grid}
            <line x1="${pad.left}" x2="${width - pad.right}" y1="${y(chart.support)}" y2="${y(chart.support)}" stroke="#b91c1c" stroke-dasharray="7 6" stroke-width="2"/>
            <line x1="${pad.left}" x2="${width - pad.right}" y1="${y(chart.resistance)}" y2="${y(chart.resistance)}" stroke="#b91c1c" stroke-dasharray="3 5" stroke-width="2"/>
            <polyline points="${closePath}" fill="none" stroke="#111827" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
            <polyline points="${sma20Path}" fill="none" stroke="#2563eb" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
            <polyline points="${sma50Path}" fill="none" stroke="#b45309" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
            <line x1="${x(trendStart)}" y1="${y(chart.history[trendStart].close)}" x2="${x(trendEnd)}" y2="${y(chart.history[trendEnd].close)}" stroke="#15803d" stroke-width="3" stroke-linecap="round"/>
            <circle cx="${x(trendEnd)}" cy="${y(chart.history[trendEnd].close)}" r="5" fill="#111827"/>
            <text x="${pad.left}" y="${height - 8}" fill="#5b6472" font-size="12">90 sesji</text>
            <text x="${width - pad.right - 140}" y="${height - 8}" fill="#5b6472" font-size="12">Ostatnia cena: ${company.price.toFixed(2)} ${company.currency}</text>
          </svg>
        `;
      }

      function metric(label, value) {
        return `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
      }

      function percent(value) {
        return `${(value * 100).toFixed(1)}%`;
      }

      function round(value, places) {
        const factor = 10 ** places;
        return Math.round(value * factor) / factor;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      form.requestSubmit();
    </script>
  </body>
